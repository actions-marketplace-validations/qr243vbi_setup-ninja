name: 'Setup Ninja Build'
description: 'Setup specific version of Ninja build tool and add it to PATH'
author: 'Ashutosh Varma & Colin Rymer & qr243vbi'
inputs:
  version:
    description: 'Ninja version. Make sure given ninja version exists in ninja github release'
    default: 'generic'
    required: true
  dest:
    description: 'Folder where ninja binary will be downloaded'
    default: 'ninja_bin'
    required: false
  platform:
    description: Override default platform detection logic. Accepted values are [mac, linux, win]
    required: false
  arch:
    description: Override default architecture detection logic. Accepted values are [arm64, x64]
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'download'
  color: 'orange'
